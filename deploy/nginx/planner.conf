server {
    listen 80;
    listen [::]:80;
    server_name nomdns.com www.nomdns.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://nomdns.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nomdns.com;

    ssl_certificate /etc/letsencrypt/live/nomdns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nomdns.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nomdns.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nomdns.com;

    ssl_certificate /etc/letsencrypt/live/nomdns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nomdns.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/planner/current/dist;
    index index.html;

    access_log /var/log/nginx/planner.access.log;
    error_log /var/log/nginx/planner.error.log;

    client_max_body_size 8m;

    location /media/ {
        alias /var/www/planner/shared/media/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4242;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
