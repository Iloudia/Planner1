limit_req_zone $binary_remote_addr zone=planner_api_public_per_ip:10m rate=30r/m;

server {
    listen 80;
    listen [::]:80;
    server_name api.meandrituals.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:4343;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.meandrituals.com;

    ssl_certificate /etc/letsencrypt/live/api.meandrituals.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.meandrituals.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/api.meandrituals.access.log;
    error_log /var/log/nginx/api.meandrituals.error.log;

    client_max_body_size 500m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        limit_req zone=planner_api_public_per_ip burst=40 nodelay;
        proxy_pass http://127.0.0.1:4343;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
